<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | AT Studios</title>
    <link rel="icon" type="image/png" href="logo.png">
    
    <style>
        :root { 
            --bg-main: #0d0d0f; 
            --text-main: #ffffff; 
            --text-dim: #b0b0b0; 
            --accent: #ffffff; 
            --border: rgba(255, 255, 255, 0.2); 
            --radius: 24px; 
            --glass: rgba(0, 0, 0, 0.6); /* Slightly darker glass to help form legibility */
        }

body { 
            background-color: var(--bg-main);
            /* --- BACKGROUND IMAGE (ZOOMED OUT) --- */
            background-image: url('ant 4.png');
            background-size: 100%; /* Changed from 'cover' to zoom out */
            background-position: center top; /* Keeps the top of the photo visible */
            background-repeat: no-repeat; /* Prevents tiling if the screen is very tall */
            background-attachment: fixed;
            /* ---------------------------------- */
            color: var(--text-main); 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            overflow-x: hidden;
            animation: pageFade 1.2s ease;
        }
        @keyframes pageFade { from { opacity: 0; } to { opacity: 1; } }

        nav { 
            display: flex; width: 100%; border-bottom: 1px solid rgba(255,255,255,0.1); 
            background: rgba(13, 13, 15, 0.8); backdrop-filter: blur(20px); 
            position: sticky; top: 0; z-index: 1000; 
        }
        .nav-btn { 
            flex: 1; text-align: center; padding: 25px 0; text-decoration: none; 
            color: var(--text-dim); text-transform: uppercase; font-size: 0.7rem; 
            letter-spacing: 4px; border-right: 1px solid rgba(255,255,255,0.1); transition: 0.4s; 
        }

        .contact-wrapper {
            display: flex; width: 100%; max-width: 1200px;
            margin: 60px auto; padding: 0 5%; gap: 40px;
            box-sizing: border-box;
            min-height: 80vh;
            align-items: center;
        }

        .form-card { 
            flex: 1; 
            background: var(--glass);
            border: 1px solid var(--border); 
            border-radius: var(--radius);
            padding: 50px; 
            backdrop-filter: blur(15px); /* Blurs the background image behind the card */
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
            animation: reveal 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .form-header { margin-bottom: 40px; text-align: center; }
        .form-header h1 { 
            font-weight: 200; letter-spacing: 15px; text-transform: uppercase; 
            font-size: 2.5rem; margin: 0; 
            text-shadow: 0 2px 10px rgba(0,0,0,0.5); /* Helps text pop against busy backgrounds */
        }
        .form-header p { color: #fff; letter-spacing: 2px; font-size: 0.8rem; margin-top: 10px; opacity: 0.8; }

        .form-group { margin-bottom: 25px; }
        label { 
            display: block; font-size: 0.65rem; text-transform: uppercase; 
            letter-spacing: 3px; margin-bottom: 10px; color: #fff;
        }

        input, textarea {
            width: 100%; background: rgba(255, 255, 255, 0.1); border: 1px solid var(--border);
            border-radius: 12px; padding: 18px; color: white; font-family: inherit;
            font-size: 1rem; box-sizing: border-box; transition: 0.3s;
        }

        input:focus, textarea:focus {
            outline: none; border-color: rgba(255, 255, 255, 0.5);
            background: rgba(255, 255, 255, 0.15);
        }

        ::placeholder { color: rgba(255, 255, 255, 0.5); }

        textarea { height: 120px; resize: none; }

        .submit-btn {
            width: 100%; padding: 22px; border-radius: 50px; border: 1px solid white;
            background: white; color: black; text-transform: uppercase;
            letter-spacing: 5px; font-size: 0.75rem; font-weight: 600; 
            cursor: pointer; transition: 0.4s; margin-top: 20px;
        }

        .submit-btn:hover { background: transparent; color: white; transform: scale(1.02); }

        @keyframes reveal {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .form-card { padding: 30px; }
            .form-header h1 { font-size: 1.8rem; letter-spacing: 8px; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="nav-btn">Home</a>
        <a href="photography.html" class="nav-btn">Photography</a>
        <a href="design.html" class="nav-btn">Design</a>
        <a href="contact.html" class="nav-btn" style="color:#fff; border-bottom: 2px solid #fff;">Contact</a>
    </nav>

    <div class="contact-wrapper">
        <div class="form-card">
            <div class="form-header">
                <h1>Contact</h1>
                <p>AT STUDIOS / CALIFORNIA</p>
            </div>

            <form id="contactForm">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" placeholder="Your Name" required>
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" placeholder="email@address.com" required>
                </div>

                <div class="form-group">
                    <label>Message</label>
                    <textarea placeholder="Tell me about your project..."></textarea>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">Send Inquiry</button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('contactForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = "Message Sent";
            btn.style.background = "rgba(255,255,255,0.2)";
            btn.style.color = "#fff";
            btn.disabled = true;

            setTimeout(() => {
                btn.innerText = "Send Inquiry";
                btn.style.background = "#fff";
                btn.style.color = "#000";
                btn.disabled = false;
                e.target.reset();
            }, 4000);
        });
    </script>
</body>
</html>
