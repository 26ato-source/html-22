<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photography | AT Studios</title>
    <link rel="icon" type="image/png" href="logo.png">
    
    <style>
        :root { 
            --bg-main: #0d0d0f; 
            --text-main: #ffffff; 
            --text-dim: #b0b0b0; 
            --accent: #ffffff; 
            --border: rgba(255, 255, 255, 0.07); 
            --radius: 24px; 
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-main); }
        ::-webkit-scrollbar-thumb { 
            background: rgba(255, 255, 255, 0.1); 
            border-radius: 10px; 
        }

        body { 
            background-color: var(--bg-main); 
            color: var(--text-main); 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            overflow-x: hidden;
            animation: pageFade 1.2s ease;
        }

        @keyframes pageFade {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        nav { 
            display: flex; width: 100%; border-bottom: 1px solid var(--border); 
            background: rgba(13, 13, 15, 0.9); backdrop-filter: blur(20px); 
            position: sticky; top: 0; z-index: 1000; 
        }
        .nav-btn { 
            flex: 1; text-align: center; padding: 25px 0; text-decoration: none; 
            color: var(--text-dim); text-transform: uppercase; font-size: 0.7rem; 
            letter-spacing: 4px; border-right: 1px solid var(--border); transition: 0.4s; 
        }

        .gallery-wrapper {
            display: flex; width: 100%; max-width: 1600px;
            margin: 0 auto; padding: 60px 5%; gap: 40px;
            align-items: flex-start; box-sizing: border-box;
        }

        .main-stage { 
            flex: 2.5; 
            animation: reveal 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .viewport {
            width: 100%;
            aspect-ratio: 16 / 9;
            overflow: hidden;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: #000;
            position: relative;
        }

        .track { 
            display: flex; height: 100%; 
            transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1); 
            will-change: transform;
            transform: translateZ(0);
            backface-visibility: hidden;
        }
        
        .slide {
            min-width: 100%; height: 100%;
            position: relative; display: flex;
            justify-content: center; align-items: center;
            overflow: hidden;
        }

        .slide .bg-blur {
            position: absolute; width: 110%; height: 110%;
            object-fit: cover; 
            filter: blur(25px) brightness(0.3);
            z-index: 1;
        }

        .slide .main-img {
            position: relative; z-index: 2;
            max-width: 100%; max-height: 100%;
            object-fit: contain; display: block;
        }

        .sidebar {
            flex: 0.8; display: grid; grid-template-columns: 1fr 1fr;
            gap: 12px; padding: 20px; border: 1px solid var(--border);
            border-radius: var(--radius); background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(10px);
            animation: reveal 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .thumb {
            width: 100%; aspect-ratio: 1 / 1; border-radius: 12px;
            overflow: hidden; cursor: pointer; border: 2px solid transparent;
            opacity: 0.3; transition: 0.4s;
        }
        .thumb img { width: 100%; height: 100%; object-fit: cover; transition: 0.6s ease; }
        .thumb:hover { opacity: 0.7; }
        .thumb:hover img { transform: scale(1.1); }
        .thumb.active-thumb { opacity: 1; border-color: #fff; transform: scale(1.05); }

        .gallery-info { 
            margin-top: 30px; 
            transition: opacity 0.4s ease;
        }
        .gallery-info h2 { font-weight: 200; letter-spacing: 10px; text-transform: uppercase; font-size: 2rem; margin: 0; }
        .gallery-info p { color: var(--text-dim); margin-top: 10px; line-height: 1.6; max-width: 700px;}

        .controls { display: flex; gap: 15px; margin-top: 20px; }
        .arrow-btn {
            background: transparent; border: 1px solid var(--border); color: white;
            padding: 12px 30px; border-radius: 50px; cursor: pointer;
            text-transform: uppercase; font-size: 0.7rem; letter-spacing: 2px;
            transition: 0.3s;
        }
        .arrow-btn:hover { background: white; color: black; }

        @keyframes reveal {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 1100px) {
            .gallery-wrapper { flex-direction: column; }
            .sidebar { grid-template-columns: repeat(5, 1fr); width: 100%; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="nav-btn">Home</a>
        <a href="photography.html" class="nav-btn" style="color:#fff; border-bottom: 2px solid #fff;">Photography</a>
        <a href="design.html" class="nav-btn">Design</a>
        <a href="contact.html" class="nav-btn">Contact</a>
    </nav>

    <div class="gallery-wrapper">
        <div class="main-stage">
            <div class="viewport" id="mainViewport">
                <div class="track" id="mainTrack">
                    <div class="slide"><img src="portrait3.png" class="bg-blur"><img src="portrait3.png" class="main-img"></div>
                    <div class="slide"><img src="3.png" class="bg-blur"><img src="3.png" class="main-img"></div>
                    <div class="slide"><img src="2.png" class="bg-blur"><img src="2.png" class="main-img"></div>
                    <div class="slide"><img src="6.png" class="bg-blur"><img src="6.png" class="main-img"></div>
                    <div class="slide"><img src="7.png" class="bg-blur"><img src="7.png" class="main-img"></div>
                    <div class="slide"><img src="11.png" class="bg-blur"><img src="11.png" class="main-img"></div>
                    <div class="slide"><img src="portrait1.png" class="bg-blur"><img src="portrait1.png" class="main-img"></div>
                    <div class="slide"><img src="10.png" class="bg-blur"><img src="10.png" class="main-img"></div>
                    <div class="slide"><img src="portrait2.png" class="bg-blur"><img src="portrait2.png" class="main-img"></div>
                    <div class="slide"><img src="mog.jpg" class="bg-blur"><img src="mog.jpg" class="main-img"></div>
                </div>
            </div>

            <div class="gallery-info" id="infoPanel">
                <h2 id="projTitle">Project Title</h2>
                <p id="projDesc">Description loading...</p>
                <div class="controls">
                    <button class="arrow-btn" onclick="changeSlide(-1)">Prev</button>
                    <button class="arrow-btn" onclick="changeSlide(1)">Next</button>
                </div>
            </div>
        </div>

        <div class="sidebar">
            <div class="thumb active-thumb" onclick="goToSlide(0)"><img src="portrait3.png"></div>
            <div class="thumb" onclick="goToSlide(1)"><img src="3.png"></div>
            <div class="thumb" onclick="goToSlide(2)"><img src="2.png"></div>
            <div class="thumb" onclick="goToSlide(3)"><img src="6.png"></div>
            <div class="thumb" onclick="goToSlide(4)"><img src="7.png"></div>
            <div class="thumb" onclick="goToSlide(5)"><img src="11.png"></div>
            <div class="thumb" onclick="goToSlide(6)"><img src="portrait1.png"></div>
            <div class="thumb" onclick="goToSlide(7)"><img src="10.png"></div>
            <div class="thumb" onclick="goToSlide(8)"><img src="portrait2.png"></div>
            <div class="thumb" onclick="goToSlide(9)"><img src="mog.jpg"></div>
        </div>
    </div>

    <script>
        let currentIdx = 0;
        const totalSlides = 10;
        const track = document.getElementById('mainTrack');
        const viewport = document.getElementById('mainViewport');
        const thumbs = document.querySelectorAll('.thumb');
        const infoPanel = document.getElementById('infoPanel');
        
        const photoData = [
            { title: "Featured Work", desc: "A cinematic look at our primary visual narrative." },
            { title: "Visual Study 03", desc: "Exploring texture and form through a modern lens." },
            { title: "Visual Study 02", desc: "Focusing on the balance between light and shadow." },
            { title: "Composition 06", desc: "An exercise in minimalist framing and negative space." },
            { title: "Project 07", desc: "Captured during the peak of natural lighting." },
            { title: "Atmosphere 11", desc: "Developing a mood through deep color grading." },
            { title: "Portrait Series I", desc: "A close-up study of raw character and expression." },
            { title: "Urban Capture 10", desc: "Exploring the geometry found within the city." },
            { title: "Portrait Series II", desc: "Continuing the narrative of human connection." },
            { title: "Frame Mogged", desc: "Clavicular gets mogged by ASU frat leader." }
        ];

        function updateGallery() {
            if(!viewport || !track) return;
            const width = viewport.clientWidth;
            track.style.transform = `translateX(${-currentIdx * width}px)`;

            infoPanel.style.opacity = 0;
            setTimeout(() => {
                document.getElementById('projTitle').innerText = photoData[currentIdx].title;
                document.getElementById('projDesc').innerText = photoData[currentIdx].desc;
                infoPanel.style.opacity = 1;
            }, 300);

            thumbs.forEach(t => t.classList.remove('active-thumb'));
            if(thumbs[currentIdx]) thumbs[currentIdx].classList.add('active-thumb');
        }

        function changeSlide(dir) {
            currentIdx = (currentIdx + dir + totalSlides) % totalSlides;
            updateGallery();
        }

        function goToSlide(num) {
            currentIdx = num;
            updateGallery();
        }

        window.onload = updateGallery;
        window.onresize = updateGallery;
    </script>
</body>
</html>
